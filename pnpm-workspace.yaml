packages:
  - data
  - schema
  - server
  - eslint-config

allowBuilds:
  '@parcel/watcher': true
  esbuild: true

catalog:
  '@eslint/js': 10.0.1
  '@stylistic/eslint-plugin': 5.10.0
  '@types/node': 24.13.2
  eslint: 10.5.0
  eslint-plugin-jsdoc: 63.0.11
  eslint-plugin-unicorn: 68.0.0
  graphql: 16.14.2
  tsdown: 0.22.3
  turbo: 2.10.3
  typescript: 6.0.3
  typescript-eslint: 8.65.0

gitBranchLockfile: true

mergeGitBranchLockfilesBranchPattern:
  - main
  - release-please--*
