packages:
  - data
  - schema
  - server
  - eslint-config

allowBuilds:
  '@parcel/watcher': true
  esbuild: true

catalog:
  '@eslint/js': 10.0.1
  '@stylistic/eslint-plugin': 5.10.0
  '@types/node': 24.12.4
  eslint: 10.4.1
  eslint-plugin-jsdoc: 63.0.1
  eslint-plugin-unicorn: 64.0.0
  graphql: 16.14.1
  tsup: 8.5.1
  tsx: 4.22.3
  turbo: 2.9.16
  typescript: 5.9.3
  typescript-eslint: 8.60.1

gitBranchLockfile: true

mergeGitBranchLockfilesBranchPattern:
  - main
  - release-please--*
