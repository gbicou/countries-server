packages:
  - data
  - schema
  - server
  - eslint-config

allowBuilds:
  '@parcel/watcher': true
  esbuild: true

catalog:
  '@eslint/js': 10.0.1
  '@stylistic/eslint-plugin': 5.10.0
  '@types/node': 24.13.1
  eslint: 10.4.1
  eslint-plugin-jsdoc: 63.0.2
  eslint-plugin-unicorn: 65.0.1
  graphql: 16.14.1
  tsdown: 0.22.2
  turbo: 2.9.17
  typescript: 6.0.3
  typescript-eslint: 8.61.0

gitBranchLockfile: true

mergeGitBranchLockfilesBranchPattern:
  - main
  - release-please--*
